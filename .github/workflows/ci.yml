name: CI

on:
  push:
  pull_request:

jobs:
  build-and-package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            timeout_minutes: 7
            artifact_name: linux-x64
          - name: Windows x64
            runner: windows-2025
            timeout_minutes: 15
            artifact_name: windows-x64
          - name: macOS Apple Silicon
            runner: macos-15
            timeout_minutes: 7
            artifact_name: macos-arm64
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libxcb1-dev ripgrep
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ripgrep
      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install ripgrep --yes --no-progress
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Package
        run: cpack --config build/CPackConfig.cmake -C Release -B build/packages
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: vijai-${{ matrix.artifact_name }}
          path: build/packages/*
          if-no-files-found: error
